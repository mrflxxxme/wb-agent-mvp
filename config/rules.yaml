# Anomaly detection rules for AnomalyChecker.
# Schema is validated by AnomalyRule Pydantic model at startup.
# condition: "lt" = below threshold is bad; "gt" = above threshold is bad

rules:
  # ── Stock ──────────────────────────────────────────────────────────
  - metric: stocks_enough_for_days
    condition: lt
    threshold: 7
    severity: critical
    message_template: "Остаток {sku}: {value:.0f} дн. (критично < {threshold:.0f})"
    action: "Срочно разместить поставку — до конца запасов меньше недели"

  - metric: stocks_enough_for_days
    condition: lt
    threshold: 14
    severity: warning
    message_template: "Остаток {sku}: {value:.0f} дн. (предупреждение < {threshold:.0f})"
    action: "Запланировать поставку в течение ближайших дней"

  # ── DRR (расход на рекламу / оборот) ──────────────────────────────
  - metric: drr_percent
    condition: gt
    threshold: 30
    severity: critical
    message_template: "DRR {sku}: {value:.1f}% (критично > {threshold:.0f}%)"
    action: "Немедленно снизить ставки или остановить рекламу"

  - metric: drr_percent
    condition: gt
    threshold: 20
    severity: warning
    message_template: "DRR {sku}: {value:.1f}% (предупреждение > {threshold:.0f}%)"
    action: "Проверить эффективность рекламных кампаний"

  # ── Маржа после рекламы ────────────────────────────────────────────
  - metric: marg_with_adv
    condition: lt
    threshold: 0
    severity: critical
    message_template: "Маржа {sku}: {value:.1f}% (убыточно)"
    action: "Пересмотреть цену или немедленно остановить рекламу"

  - metric: marg_with_adv
    condition: lt
    threshold: 8
    severity: warning
    message_template: "Маржа {sku}: {value:.1f}% (ниже нормы < {threshold:.0f}%)"
    action: "Проверить ценообразование и рекламные ставки"

  # ── Выполнение плана ───────────────────────────────────────────────
  - metric: plan_execution_percent
    condition: lt
    threshold: 65
    severity: critical
    message_template: "Выполнение плана: {value:.1f}% (критично < {threshold:.0f}%)"
    action: "Экстренный анализ причин отставания — нужны немедленные действия"

  - metric: plan_execution_percent
    condition: lt
    threshold: 80
    severity: warning
    message_template: "Выполнение плана: {value:.1f}% (предупреждение < {threshold:.0f}%)"
    action: "Усилить продвижение и проверить конверсию"

  # ── Качество выкупа ────────────────────────────────────────────────
  - metric: buyout_percent_month
    condition: lt
    threshold: 60
    severity: critical
    message_template: "Выкуп {sku}: {value:.1f}% (критично < {threshold:.0f}%)"
    action: "Проверить качество и соответствие описания товара"

  - metric: buyout_percent_month
    condition: lt
    threshold: 73
    severity: warning
    message_template: "Выкуп {sku}: {value:.1f}% (предупреждение < {threshold:.0f}%)"
    action: "Улучшить описание, фото, отзывы"
